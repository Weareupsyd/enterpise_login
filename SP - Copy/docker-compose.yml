version: "2"

services:
  sp-db:
    image: postgres:16
    ports:
      - "5433:5432" 
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo17
      - POSTGRES_PASSWORD=odoo
    volumes:
      - sp-db-data:/var/lib/postgresql/data

  sp-web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8070:8069"
    environment:
      - DB_HOST=sp-db
      - DB_PORT=5432
      - DB_USER=odoo17
      - DB_PASSWORD=odoo
    volumes:
      - ./customs:/customs
      - ./odoo.conf:/etc/odoo/odoo.conf
      - sp-web-data:/var/lib/odoo

volumes:
  sp-web-data:
  sp-db-data:
